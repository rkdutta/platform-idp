# nginx config for docker-compose
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Handle Angular client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional reverse proxy to the backend (the SPA calls the API directly via
    # its baked-in apiUrl, so this is a convenience only). Using a variable +
    # docker's embedded DNS resolver defers name resolution to request time so
    # nginx starts even if teams-api isn't up yet.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream http://teams-api:8000;
        proxy_pass $upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
