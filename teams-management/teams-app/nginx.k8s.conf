# nginx config for the teams-ui pod (no ingress).
# Serves the SPA and reverse-proxies /api to the internal teams-api Service so
# the browser only ever talks to this pod's origin for API calls.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Angular client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to the in-cluster teams-api Service (same namespace).
    # Variable + kube-dns resolver defers name resolution to request time so
    # nginx starts even if the API isn't ready yet.
    #
    # NOTE: with a variable in proxy_pass, nginx does NOT append the unmatched
    # part of the URI, so a plain `proxy_pass $upstream/;` sends every /api/*
    # request to `/`. Use a regex capture and forward $1 explicitly so
    # /api/teams -> /teams, /api/teams/{id} -> /teams/{id}, query args preserved.
    location ~ ^/api/(.*)$ {
        resolver 10.96.0.10 valid=10s;
        set $upstream http://teams-api-service.engineering-platform.svc.cluster.local:8000;
        proxy_pass $upstream/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
