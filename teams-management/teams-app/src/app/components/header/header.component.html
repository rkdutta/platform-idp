<header class="header">
  <div class="header-content">
    <div class="header-left">
      <h1>Engineering Platform</h1>
      <p class="subtitle">Teams Management</p>
    </div>

    <div class="header-right">
      <button
        type="button"
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="themeService.isDark ? 'Switch to light theme' : 'Switch to dark theme'"
        [title]="themeService.isDark ? 'Switch to light theme' : 'Switch to dark theme'"
      >
        <span class="theme-toggle-icon">{{ themeService.isDark ? '☀️' : '🌙' }}</span>
      </button>

      <ng-container *ngIf="isLoggedIn">
        <div class="user-info">
          <span class="welcome-text">
            Welcome, {{ userProfile?.firstName || userProfile?.username }}!
          </span>
          <div class="user-roles" *ngIf="userRoles.length > 0">
            <span class="role-badge" *ngFor="let role of userRoles">
              {{ role }}
            </span>
          </div>
        </div>
        <button class="btn btn-secondary" (click)="logout()">
          Logout
        </button>
      </ng-container>

      <button class="btn btn-primary" *ngIf="!isLoggedIn" (click)="login()">
        Login
      </button>
    </div>
  </div>
</header>
